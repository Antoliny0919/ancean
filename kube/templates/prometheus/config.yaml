{{ $Env := .Values.env }}
{{ $Name := .Release.Name }}
{{ $Namespace := .Values.namespace }}
{{- with .Values.prometheus }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $Name }}-prometheus-config
  namespace: {{ $Namespace }}-monitoring
data:
  prometheus.yml: |-
    global:
      scrape_interval: 30s

    scrape_configs:
      - job_name: '{{ $Name }}-{{ $Env }}-pods'
        kubernetes_sd_configs:
        - role: pod 
        relabel_configs:
        - source_labels: 
            - __meta_kubernetes_namespace
          action: keep
          regex: {{ $Namespace }}
        - source_labels: 
            - __meta_kubernetes_pod_annotationpresent_prometheus_io_scrape
            - __meta_kubernetes_pod_annotation_prometheus_io_scrape
          regex: true;false
          action: drop
        - source_labels: 
            - __meta_kubernetes_pod_annotationpresent_prometheus_io_path
            - __meta_kubernetes_pod_annotation_prometheus_io_path
          regex: true;(.*)
          target_label:  __metrics_path__
        - source_labels: 
            - __meta_kubernetes_pod_annotationpresent_prometheus_io_target
            - __meta_kubernetes_pod_annotation_prometheus_io_target
          regex: true;(.*)
          target_label:  __param_target
        - source_labels: 
            - __meta_kubernetes_pod_annotationpresent_prometheus_io_port
            - __address__
            - __meta_kubernetes_pod_annotation_prometheus_io_port
          action: replace
          regex: true;([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: 
            - __meta_kubernetes_pod_labelpresent_app
            - __meta_kubernetes_pod_label_app
          regex: true;(.*)
          target_label: app
        - source_labels: 
            - __meta_kubernetes_pod_name
          target_label: instance
{{- end }}
{{ $Namespace := .Values.namespace }}
{{ $Name := .Release.Name}}
{{ $Env := .Values.env }}
{{- with .Values.grafana }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $Name }}-grafana-deployment
  namespace: {{ $Namespace }}-monitoring
  labels:
    ancean: {{ $Env }}
spec:
  selector:
    matchLabels:
      app: {{ $Name }}-grafana
  template:
    metadata:
      labels:
        app: {{ $Name }}-grafana
    spec:
      securityContext:
        fsGroup: 472
        supplementalGroups:
          - 0
      containers:
        - name: {{ $Name }}-grafana-container
          image: grafana/grafana:10.1.6
          ports:
            - containerPort: {{ .service.targetPort }}
              name: {{ $Name }}-grafana
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .user | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .password | quote }}
            - name: GF_USERS_DEFAULT_THEME
              value: {{ .theme | quote }}
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /robots.txt
              port: {{ .service.targetPort }}
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: {{ .service.targetPort }}
            timeoutSeconds: 1
          resources:
            requests:
              cpu: {{ .resources.cpu }}
              memory: {{ .resources.memory }}
          volumeMounts:
            - name: config-datasources
              mountPath: "/etc/grafana/provisioning/datasources"
              readOnly: true
            - name: config-providers
              mountPath: "/etc/grafana/provisioning/dashboards"
              readOnly: true
            - name: dashboards
              mountPath: "/var/lib/grafana/dashboards"
      
      volumes:
        - name: config-datasources
          configMap:
            name: {{ $Name }}-grafana-config
            items:
            - key: datasources.yaml
              path: datasources.yaml
        - name: config-providers
          configMap:
            name: {{ $Name}}-grafana-config
            items:
            - key: providers.yaml
              path: providers.yaml
        - name: dashboards
          projected:
              sources:
                - configMap:
                    name: {{ $Name }}-grafana-dashboard-config

{{- end }}
{{ $WebServicePort := .Values.web.service.servicePort }}
{{ $APIServicePort := .Values.api.service.servicePort }}
{{ $Name := .Release.Name }}
{{ $Env := .Values.env }}
{{ $Namespace := .Values.namespace }}
{{- with .Values.nginx }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $Name }}-nginx-config
  namespace: {{ $Namespace }}
  labels: 
    ancean: {{ $Env }}
data:
  nginx.conf: |-
    user  nginx;
    worker_processes  1;

    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
      worker_connections  1024;
    }

    http {
      proxy_cache_path /data/nginx/cache levels=1:2 keys_zone=STATIC:10m inactive=24h  max_size=1g;

      gzip  on;    
      gzip_proxied any;

      map $sent_http_content_type $expires {
        default                    off;
        ~image/                    6M;
      } 

      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        location / {
          proxy_pass http://{{ $Name }}-web-service:{{ $WebServicePort }};
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_cache            STATIC;
          proxy_cache_valid      200  1d;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/ {
          proxy_pass http://{{ $Name }}-api-service:{{ $APIServicePort }};
          proxy_set_header Host $host;
          proxy_cache            STATIC;
          proxy_cache_valid      200  1d;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /media/ {
          proxy_pass http://{{ $Name }}-api-service:{{ $APIServicePort }};
          proxy_set_header Host $host;
          proxy_cache            STATIC;
          proxy_cache_valid      200  1d;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- with .exporter }}
        location /stub_status {
            stub_status;
        }
        {{- end }}
      }
    }
{{- end }}
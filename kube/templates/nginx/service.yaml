apiVersion: v1
kind: Service
metadata: 
  name: {{ .Release.Name }}-nginx-service
  namespace: {{ .Values.namespace }}
  labels: 
    ancean: {{ .Values.env }}
spec:
  ports:
    - port: {{ .Values.nginx.service.servicePort }}
      targetPort: {{ .Values.nginx.service.targetPort }}
  selector:
    app: {{ .Release.Name }}-nginx
  type: {{ .Values.nginx.service.serviceType }}
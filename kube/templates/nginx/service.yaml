{{ $Name := .Release.Name }}
{{ $Namespace := .Values.namespace }}
{{ $Env := .Values.env }}
{{- with .Values.nginx }}
apiVersion: v1
kind: Service
metadata: 
  name: {{ $Name }}-nginx-service
  namespace: {{ $Namespace }}
  labels: 
    ancean: {{ $Env }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: 443
      targetPort: 443
  selector:
    app: {{ $Name }}-nginx
  type: {{ .service.serviceType }}
{{- end }}
version: '3.7'

services:

  nginx:
    image: nginx:1.24.0
    ports:
      - "80:80"
    volumes:
      - ./config/dev/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./config/dev/nginx/cache:/data/nginx/cache
    container_name: ancean-nginx
    depends_on:
      - api
      - web
    networks:
      - default-bridge

  web:
    image: antoliny0919/ancean-front:v1.0.0
    container_name: web-dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    ports:
      - "4040:3000"
    networks:
      - default-bridge

  api:
    image: antoliny0919/ancean-back:v1.0.0
    container_name: api-dev
    secrets:
      - source: postgres-connection
        target: /usr/app/ancean/secrets/postgres-secrets.json
      - source: django-connection
        target: /usr/app/ancean/secrets/django-secrets.json
      - source: oauth-connection
        target: /usr/app/ancean/secrets/oauth-secrets.json
    ports:
      - "6060:8000"
    networks:
      - default-bridge
  
  postgres:
    image: postgres:14
    restart: always
    container_name: ancean-postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ancean
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - ./config/dev/data:/var/lib/postgresql/data
    networks:
      - default-bridge

secrets:
  postgres-connection:
    file: ./secrets/postgres-secrets.json
  django-connection:
    file: ./secrets/django-secrets.json
  oauth-connection:
    file: ./secrets/oauth-secrets.json

networks:
  default-bridge:
    name: dev-net